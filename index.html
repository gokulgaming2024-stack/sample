<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tic Tac Toe</h1>
        </header>

        <main>
            <!-- Game Setup Section -->
            <section id="setupSection" class="setup-section">
                <div class="form-group">
                    <label for="player1Name">Player 1 (X):</label>
                    <input type="text" id="player1Name" placeholder="Enter name" value="Player 1">
                </div>
                <div class="form-group">
                    <label for="player2Name">Player 2 (O):</label>
                    <input type="text" id="player2Name" placeholder="Enter name" value="Player 2">
                </div>
                <button id="startBtn" class="btn btn-primary">Start Game</button>
            </section>

            <!-- Game Section -->
            <section id="gameSection" class="game-section hidden">
                <div class="game-info">
                    <div id="currentPlayer" class="current-player"></div>
                    <button id="restartBtn" class="btn btn-secondary">Restart Game</button>
                </div>

                <div class="board" id="gameBoard">
                    <div class="square" data-index="0"></div>
                    <div class="square" data-index="1"></div>
                    <div class="square" data-index="2"></div>
                    <div class="square" data-index="3"></div>
                    <div class="square" data-index="4"></div>
                    <div class="square" data-index="5"></div>
                    <div class="square" data-index="6"></div>
                    <div class="square" data-index="7"></div>
                    <div class="square" data-index="8"></div>
                </div>

                <div id="gameResult" class="game-result hidden">
                    <h2 id="resultMessage"></h2>
                    <button id="playAgainBtn" class="btn btn-primary">Play Again</button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
