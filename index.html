<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="signup-page">
      <section class="hero-panel">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <div class="brand-badge">ODIN</div>
          <h1>Join the experience</h1>
          <p>Start building beautiful projects and learning with a community of curious makers.</p>
        </div>
      </section>

      <section class="form-panel">
        <div class="form-card">
          <div class="form-header">
            <img src="odin-lined.png" alt="Odin logo" class="brand-logo" />
            <div>
              <h2>Create Account</h2>
              <p>Enter your details to start your journey.</p>
            </div>
          </div>

          <form class="signup-form" novalidate>
            <div class="field-group">
              <label for="email">Email</label>
              <input id="email" type="email" name="email" placeholder="you@example.com" required />
            </div>

            <div class="field-group">
              <label for="username">Username</label>
              <input id="username" type="text" name="username" placeholder="username" required minlength="3" />
            </div>

            <div class="field-group">
              <label for="password">Password</label>
              <input id="password" type="password" name="password" placeholder="Enter password" required minlength="8" />
            </div>

            <div class="field-group">
              <label for="confirm-password">Confirm Password</label>
              <input id="confirm-password" type="password" name="confirm-password" placeholder="Confirm password" required minlength="8" />
            </div>

            <button type="submit" class="submit-button">Create Account</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
