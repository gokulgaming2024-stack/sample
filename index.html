<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My Library</h1>
            <button id="newBookBtn" class="btn btn-primary">+ New Book</button>
        </header>

        <main>
            <div id="libraryDisplay" class="library-grid"></div>
        </main>
    </div>

    <!-- Add Book Dialog -->
    <dialog id="addBookDialog" class="dialog">
        <div class="dialog-content">
            <h2>Add New Book</h2>
            <form id="bookForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" name="author" required>
                </div>
                <div class="form-group">
                    <label for="pages">Number of Pages</label>
                    <input type="number" id="pages" name="pages" required min="1">
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="read" name="read">
                    <label for="read">I have read this book</label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Add Book</button>
                    <button type="button" id="closeDialog" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
