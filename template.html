<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🌤️ Weather App</h1>
            <p class="subtitle">Get weather information for any location</p>
        </header>

        <main class="main">
            <!-- Search Form -->
            <div class="search-section">
                <form id="searchForm" class="search-form">
                    <div class="form-group">
                        <input
                            type="text"
                            id="locationInput"
                            class="location-input"
                            placeholder="Enter city name or coordinates (lat,lon)..."
                            required
                        >
                        <button type="submit" class="search-btn">Search</button>
                    </div>
                    <p class="form-hint">Examples: London, New York, 40.7128,-74.0060</p>
                </form>
            </div>

            <!-- Loading State -->
            <div id="loading" class="loading hidden">
                <div class="loader"></div>
                <p>Fetching weather data...</p>
            </div>

            <!-- Error Message -->
            <div id="error" class="error-message hidden"></div>

            <!-- Weather Display -->
            <div id="weatherDisplay" class="weather-display hidden">
                <div class="weather-header">
                    <div class="location-info">
                        <h2 id="locationName" class="location-name"></h2>
                        <p id="coordinates" class="coordinates"></p>
                    </div>
                    <div id="weatherIcon" class="weather-icon"></div>
                </div>

                <div class="weather-main">
                    <div class="temperature-display">
                        <span id="temperature" class="temperature"></span>
                        <span class="unit">°C</span>
                    </div>
                    <p id="weatherDescription" class="weather-description"></p>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <span class="detail-label">Feels Like</span>
                        <span id="feelsLike" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Humidity</span>
                        <span id="humidity" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Wind Speed</span>
                        <span id="windSpeed" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Pressure</span>
                        <span id="pressure" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Visibility</span>
                        <span id="visibility" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">UV Index</span>
                        <span id="uvIndex" class="detail-value"></span>
                    </div>
                </div>

                <div class="weather-extra">
                    <div class="extra-item">
                        <span class="extra-label">Sunrise</span>
                        <span id="sunrise" class="extra-value"></span>
                    </div>
                    <div class="extra-item">
                        <span class="extra-label">Sunset</span>
                        <span id="sunset" class="extra-value"></span>
                    </div>
                    <div class="extra-item">
                        <span class="extra-label">Timezone</span>
                        <span id="timezone" class="extra-value"></span>
                    </div>
                </div>

                <div class="last-updated">
                    <small id="lastUpdated"></small>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>Weather data provided by <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a></p>
        </footer>
    </div>
</body>
</html>
